<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="dShield" cx="50%" cy="45%" r="60%">
      <stop offset="0%"  stop-color="#d9c2ff"/>
      <stop offset="55%" stop-color="#9c6fe6"/>
      <stop offset="100%" stop-color="#4a2684"/>
    </radialGradient>
    <linearGradient id="dGem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#cdd6e8"/>
      <stop offset="100%" stop-color="#5a6382"/>
    </linearGradient>
    <linearGradient id="dLaurel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#c79ef2"/>
      <stop offset="100%" stop-color="#5e2fa3"/>
    </linearGradient>
    <linearGradient id="dCrown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#f0e0ff"/>
      <stop offset="100%" stop-color="#8c5edb"/>
    </linearGradient>
  </defs>
  <!-- Shield body -->
  <path d="M20 36 Q60 26 100 36 L100 68 Q100 96 60 110 Q20 96 20 68 Z"
        fill="url(#dShield)" stroke="#321a58" stroke-width="2" stroke-linejoin="round"/>
  <!-- Crown on top -->
  <g stroke="#321a58" stroke-width="1.6" stroke-linejoin="round" fill="url(#dCrown)">
    <path d="M40 30 L46 14 L54 26 L60 12 L66 26 L74 14 L80 30 Z"/>
  </g>
  <circle cx="46" cy="14" r="3" fill="#fff" stroke="#321a58" stroke-width="1.2"/>
  <circle cx="60" cy="12" r="3" fill="#fff" stroke="#321a58" stroke-width="1.2"/>
  <circle cx="74" cy="14" r="3" fill="#fff" stroke="#321a58" stroke-width="1.2"/>
  <!-- Laurel leaves -->
  <g fill="url(#dLaurel)" stroke="#321a58" stroke-width="1.2" stroke-linejoin="round">
    <path d="M18 54 Q12 62 18 72 Q26 70 26 62 Z"/>
    <path d="M18 68 Q14 78 22 86 Q30 82 28 74 Z"/>
    <path d="M102 54 Q108 62 102 72 Q94 70 94 62 Z"/>
    <path d="M102 68 Q106 78 98 86 Q90 82 92 74 Z"/>
  </g>
  <!-- Diamond gem -->
  <g stroke="#1a1437" stroke-width="1.8" stroke-linejoin="round">
    <path d="M42 46 L60 40 L78 46 L60 90 Z" fill="url(#dGem)"/>
    <path d="M42 46 L78 46" stroke-width="1.4"/>
    <path d="M50 46 L60 90 L70 46" stroke-width="1" opacity="0.6"/>
    <path d="M42 46 L50 46 L60 40" fill="#fff" opacity="0.65" stroke="none"/>
  </g>
  <!-- Sparkle -->
  <g fill="#fff" opacity="0.95">
    <path d="M50 54 L52 60 L50 66 L48 60 Z"/>
    <path d="M44 60 L50 58 L56 60 L50 62 Z"/>
  </g>
</svg>
