<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="iGem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#d7ecef"/>
      <stop offset="100%" stop-color="#6fa8b5"/>
    </linearGradient>
    <linearGradient id="iWing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ebf7f9"/>
      <stop offset="100%" stop-color="#7eaab2"/>
    </linearGradient>
    <linearGradient id="iCrown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a8c6cc"/>
    </linearGradient>
  </defs>
  <!-- icy leaf wings -->
  <g stroke="#4a6f78" stroke-width="1.4" stroke-linejoin="round" fill="url(#iWing)">
    <path d="M8 54 L32 48 L32 66 L8 74 Z"/>
    <path d="M12 66 L34 60 L34 78 L12 86 Z"/>
    <path d="M112 54 L88 48 L88 66 L112 74 Z"/>
    <path d="M108 66 L86 60 L86 78 L108 86 Z"/>
  </g>
  <!-- tiny crown on top -->
  <g stroke="#4a6f78" stroke-width="1.5" stroke-linejoin="round" fill="url(#iCrown)">
    <path d="M42 30 L48 14 L56 26 L60 12 L64 26 L72 14 L78 30 Z"/>
  </g>
  <circle cx="48" cy="14" r="3.2" fill="#fff" stroke="#4a6f78" stroke-width="1.2"/>
  <circle cx="60" cy="12" r="3.2" fill="#fff" stroke="#4a6f78" stroke-width="1.2"/>
  <circle cx="72" cy="14" r="3.2" fill="#fff" stroke="#4a6f78" stroke-width="1.2"/>
  <!-- pentagon crystal body -->
  <g stroke="#4a6f78" stroke-width="1.8" stroke-linejoin="round">
    <path d="M60 30 L88 50 L78 88 L42 88 L32 50 Z" fill="url(#iGem)"/>
    <path d="M60 30 L60 88" opacity="0.3"/>
    <path d="M32 50 L88 50" opacity="0.25"/>
    <path d="M42 88 L88 50" opacity="0.2"/>
    <path d="M60 30 L78 88" opacity="0.2"/>
  </g>
  <!-- bottom ice shard -->
  <path d="M52 88 L68 88 L64 104 L56 104 Z" fill="url(#iGem)" stroke="#4a6f78" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- sparkle -->
  <g fill="#fff" opacity="0.9">
    <path d="M45 42 L47 48 L45 54 L43 48 Z"/>
    <path d="M39 48 L45 46 L51 48 L45 50 Z"/>
  </g>
</svg>
