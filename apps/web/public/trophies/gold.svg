<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="gCrown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#fff3a8"/>
      <stop offset="45%" stop-color="#f4c534"/>
      <stop offset="100%" stop-color="#9e6f0a"/>
    </linearGradient>
    <linearGradient id="gGem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#fff19a"/>
      <stop offset="50%" stop-color="#f2b927"/>
      <stop offset="100%" stop-color="#7a5209"/>
    </linearGradient>
    <linearGradient id="gWing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#fde07e"/>
      <stop offset="100%" stop-color="#b0780d"/>
    </linearGradient>
  </defs>
  <!-- side wings -->
  <g stroke="#6e4804" stroke-width="1.4" stroke-linejoin="round">
    <path d="M10 62 L36 56 L36 72 L10 80 Z" fill="url(#gWing)"/>
    <path d="M14 72 L38 66 L38 82 L14 90 Z" fill="url(#gWing)"/>
    <path d="M110 62 L84 56 L84 72 L110 80 Z" fill="url(#gWing)"/>
    <path d="M106 72 L82 66 L82 82 L106 90 Z" fill="url(#gWing)"/>
  </g>
  <!-- crown -->
  <g stroke="#6e4804" stroke-width="1.8" stroke-linejoin="round" fill="url(#gCrown)">
    <path d="M32 44 L40 18 L52 36 L60 14 L68 36 L80 18 L88 44 Z"/>
  </g>
  <circle cx="40" cy="18" r="4.5" fill="#fff6c6" stroke="#6e4804" stroke-width="1.4"/>
  <circle cx="60" cy="14" r="4.5" fill="#fff6c6" stroke="#6e4804" stroke-width="1.4"/>
  <circle cx="80" cy="18" r="4.5" fill="#fff6c6" stroke="#6e4804" stroke-width="1.4"/>
  <!-- hexagon gem body -->
  <g stroke="#6e4804" stroke-width="1.8" stroke-linejoin="round">
    <path d="M60 44 L86 56 L86 82 L60 94 L34 82 L34 56 Z" fill="url(#gGem)"/>
    <path d="M60 44 L60 94" opacity="0.3"/>
    <path d="M34 56 L86 82" opacity="0.2"/>
    <path d="M86 56 L34 82" opacity="0.2"/>
  </g>
  <!-- sparkle -->
  <g fill="#fff">
    <path d="M44 52 L46 58 L44 64 L42 58 Z" opacity="0.9"/>
    <path d="M38 58 L44 56 L50 58 L44 60 Z" opacity="0.9"/>
  </g>
</svg>
